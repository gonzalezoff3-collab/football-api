<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Football Match Analyzer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #38bdf8;
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 8px;
      border: none;
      margin-top: 20px;
    }

    button {
      padding: 10px 15px;
      margin-left: 10px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      cursor: pointer;
      font-weight: bold;
    }

    .card {
      background: #1e293b;
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      display: inline-block;
      min-width: 300px;
    }

    .error {
      color: red;
    }
  </style>
</head>

<body>

<h1>⚽ Football Match Analyzer</h1>

<input id="teamInput" placeholder="Nom de l'équipe (ex: PSG)" />
<button onclick="searchTeam()">Rechercher</button>

<div id="result"></div>

<script>
const API_BASE = "https://football-match-analyzer-sspl.onrender.com";

async function searchTeam() {
  const name = document.getElementById("teamInput").value;
  const resultDiv = document.getElementById("result");

  resultDiv.innerHTML = "Chargement...";

  try {
    const res = await fetch(`${API_BASE}/team/${name}`);
    const data = await res.json();

    if (!data.success) {
      resultDiv.innerHTML = "<p class='error'>Équipe introuvable</p>";
      return;
    }

    const team = data.team;

    resultDiv.innerHTML = `
      <div class="card">
        <h2>${team.name}</h2>
        <p>📍 Pays : ${team.country || "N/A"}</p>
        <p>🏟 ID : ${team.id}</p>
        <button onclick="loadMatches(${team.id})">Voir derniers matchs</button>
      </div>
      <div id="matches"></div>
    `;

  } catch (err) {
    resultDiv.innerHTML = "<p class='error'>Erreur serveur</p>";
  }
}

async function loadMatches(teamId) {
  const matchesDiv = document.getElementById("matches");

  matchesDiv.innerHTML = "Chargement des matchs...";

  try {
    const res = await fetch(`${API_BASE}/fixtures/${teamId}`);
    const data = await res.json();

    if (!data.success) {
      matchesDiv.innerHTML = "<p class='error'>Erreur matchs</p>";
      return;
    }

    matchesDiv.innerHTML = "<h3>Derniers matchs</h3>";

    data.matches.forEach(match => {
      const home = match.teams.home.name;
      const away = match.teams.away.name;
      const score = `${match.goals.home ?? 0} - ${match.goals.away ?? 0}`;

      matchesDiv.innerHTML += `
        <div class="card">
          <p>${home} vs ${away}</p>
          <strong>${score}</strong>
        </div>
      `;
    });

  } catch (err) {
    matchesDiv.innerHTML = "<p class='error'>Erreur serveur</p>";
  }
}
</script>

</body>
</html>
